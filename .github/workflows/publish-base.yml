name: Publish base image

on:
  push:
    branches:
      - main
    paths:
      - "Dockerfile.base"
      - "base/**"
      - ".github/workflows/publish-base.yml"
  workflow_dispatch:
    inputs:
      base_tag:
        description: "Base tag"
        required: true
        default: "base-current"
        type: string

permissions:
  contents: read

env:
  DOCKERHUB_NAMESPACE: itseasi
  BASE_IMAGE: runpod-base

jobs:
  publish-base:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set base tags
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BASE_TAG="${{ inputs.base_tag }}"
          else
            BASE_TAG="base-current"
          fi

          SHORT_SHA="${GITHUB_SHA::7}"

          echo "base_tag=${BASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=base-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.base
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.BASE_IMAGE }}:${{ steps.vars.outputs.base_tag }}
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.BASE_IMAGE }}:${{ steps.vars.outputs.sha_tag }}