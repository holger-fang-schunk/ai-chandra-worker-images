name: Publish worker image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "Dockerfile.worker"
      - "worker/**"
      - ".github/workflows/publish-worker.yml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Worker image tag, e.g. v1.0.0 or test-001"
        required: true
        type: string
      base_image:
        description: "Existing base image"
        required: true
        default: "deinuser/runpod-base:base-current"
        type: string
      publish_runpod:
        description: "Also update the :runpod tag"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

env:
  DOCKERHUB_NAMESPACE: itseasi
  WORKER_IMAGE: runpod-worker
  DEFAULT_BASE_IMAGE: itseasi/runpod-base:base-current

jobs:
  publish-worker:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set worker build variables
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            IMAGE_TAG="${{ inputs.image_tag }}"
            BASE_IMAGE="${{ inputs.base_image }}"
            PUBLISH_RUNPOD="${{ inputs.publish_runpod }}"
          elif [[ "${GITHUB_REF_TYPE}" = "tag" ]]; then
            IMAGE_TAG="${GITHUB_REF_NAME}"
            BASE_IMAGE="${{ env.DEFAULT_BASE_IMAGE }}"
            PUBLISH_RUNPOD="true"
          else
            IMAGE_TAG="dev-${GITHUB_SHA::7}"
            BASE_IMAGE="${{ env.DEFAULT_BASE_IMAGE }}"
            PUBLISH_RUNPOD="false"
          fi

          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "base_image=${BASE_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "publish_runpod=${PUBLISH_RUNPOD}" >> "$GITHUB_OUTPUT"

      - name: Compose Docker tags
        id: tags
        shell: bash
        run: |
          IMAGE="${{ env.DOCKERHUB_NAMESPACE }}/${{ env.WORKER_IMAGE }}"
          TAGS="${IMAGE}:${{ steps.vars.outputs.image_tag }}"

          if [[ "${GITHUB_REF_TYPE}" = "tag" ]]; then
            TAGS="${TAGS}"$'\n'"${IMAGE}:latest"
          fi

          if [[ "${{ steps.vars.outputs.publish_runpod }}" = "true" ]]; then
            TAGS="${TAGS}"$'\n'"${IMAGE}:runpod"
          fi

          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          platforms: linux/amd64
          build-args: |
            BASE_IMAGE=${{ steps.vars.outputs.base_image }}
          tags: ${{ steps.tags.outputs.tags }}